image:
  repository: "bitcoin/bitcoin"
  tag: "30.2-alpine"

command:
  - "bitcoind"

args:
  # basic
  - "-server=1"
  - "-disablewallet=0"
  - "-txindex=1"
  - "-blockfilterindex=1"
  # rpc
  - "-rpcbind=:8332"
  - "-rpcallowip=0.0.0.0/0"
  - "-zmqpubrawtx=tcp://0.0.0.0:28332"
  - "-zmqpubrawblock=tcp://0.0.0.0:28333"

hostPaths:
  - name: data
    hostPath: /srv/nvme/scrap-data/bitcoin
    containerPath: /home/bitcoin/.bitcoin

ports: 
- name: rpc
  containerPort: 8332
- name: p2p
  containerPort: 8333
- name: zmqtx
  containerPort: 28332
- name: zmqblock
  containerPort: 28333

gateway:
  host: btc.wagner.gg

health:
  port: rpc
  type: TCP

securityContext:
  runAsUser: 5000
