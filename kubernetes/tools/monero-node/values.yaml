image:
  repository: "ghcr.io/sethforprivacy/simple-monerod"
  tag: "v0.18.5.0@sha256:fd8bc12e93b3734e579a86ec6a6082d117fa0d53aa24e9174820dbf7ec4bc760"

args:
  - --rpc-restricted-bind-ip=0.0.0.0
  - --rpc-restricted-bind-port=18089
  - --no-igd
  - --no-zmq

hostPaths:
  - name: data
    hostPath: /srv/nvme/scrap-data/monero
    containerPath: /home/monero/.bitmonero

ports:
  - name: main
    containerPort: 18089
  - name: p2p
    containerPort: 18080

gateway:
  host: monero.wagner.gg

health:
  path: /get_height

securityContext:
  runAsUser: 5000
