image:
  repository: "ghcr.io/readur/readur"
  tag: "2.7.7@sha256:6d9d0ff5e3379dbafd598bb9de8d3e617c4a226b8c6d3ed77a7b1a833f6a0ec0"

hostPaths:
  - name: uploads
    hostPath: /srv/nvme/container-data/readur-uploads
    containerPath: /app/uploads
  - name: watch
    hostPath: /srv/nvme/container-data/readur-watch
    containerPath: /app/watch

ports:
  - name: main
    containerPort: 8080

health:
  path: /api/health

gateway:
  host: readur.wagner.gg

database:
  enabled: true
  type: postgresql
  hostPath: /srv/nvme/container-data/readur-db
  rootPassword: 

envs:
  - DATABASE_URL: postgres://$(TEMPLATE_DB_USERNAME):$(TEMPLATE_DB_PASSWORD)@$(TEMPLATE_DB_HOST):$(TEMPLATE_DB_PORT)/$(TEMPLATE_DB_DATABASE)
  - SERVER_ADDRESS: 0.0.0.0:8080
  - UPLOAD_PATH: /app/uploads
  - WATCH_FOLDER: /app/watch
  - OCR_LANGUAGE: eng+deu
  - MAX_FILE_SIZE_MB: 256
  - MAX_PDF_SIZE_MB: 256
  - MAX_OFFICE_DOCUMENT_SIZE_MB: 256
  - MEMORY_LIMIT_MB: 1024
  # OIDC
  - OIDC_ENABLED: true
  - OIDC_CLIENT_ID: 36a92b6c-533d-403b-a9c9-4f6dba864b7b
  - OIDC_ISSUER_URL: https://id.wagner.gg
  - OIDC_REDIRECT_URI: https://readur.wagner.gg/api/auth/oidc/callback
  - OIDC_AUTO_REGISTER: true
  - ALLOW_LOCAL_AUTH: true

secretEnvs:
  - JWT_SECRET: 
  - OIDC_CLIENT_SECRET: 

homepage:
  name: Readur
  group: Cloud
  description: Da war ich wirklich!
  icon: https://avatars.githubusercontent.com/u/216796041?s=200&v=4
  weight: 80
