image:
  repository: "ghcr.io/paperless-ngx/paperless-ngx"
  tag: "2.20.10@sha256:07a0b4ba01ce377c82a0636e16c0c3d931fde5b7e9304de6601986cc42d9b6e6"

hostPaths:
  - name: data
    hostPath: /srv/nvme/container-data/paperless-ngx-data
    containerPath: /usr/src/paperless/data
  - name: media
    hostPath: /srv/nvme/container-data/paperless-ngx-media
    containerPath: /usr/src/paperless/media
  - name: consume
    hostPath: /srv/nvme/scanner/paperless
    containerPath: /usr/src/paperless/consume

ports:
  - name: main
    containerPort: 8000

health:
  startupProbeFailureThreshold: 90

gateway:
  host: paperless.wagner.gg

envs:
  # services
  - PAPERLESS_DBENGINE: mariadb
  - PAPERLESS_DBHOST: $(TEMPLATE_DB_HOST)
  - PAPERLESS_DBPORT: $(TEMPLATE_DB_PORT)
  - PAPERLESS_DBNAME: $(TEMPLATE_DB_DATABASE)
  - PAPERLESS_DBUSER: $(TEMPLATE_DB_USERNAME)
  - PAPERLESS_DBPASS: $(TEMPLATE_DB_PASSWORD)
  - PAPERLESS_REDIS: redis://paperless-redis:6379
  - PAPERLESS_TIKA_ENABLED: 1
  - PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://paperless-gotenberg:3000
  - PAPERLESS_TIKA_ENDPOINT: http://paperless-tika:9998
  # config
  - PAPERLESS_URL: https://paperless.wagner.gg
  - PAPERLESS_PRE_CONSUME_SCRIPT: /scripts/ocr-decrypt.sh
  - PAPERLESS_CONSUMER_DELETE_DUPLICATES: true
  - PAPERLESS_CONSUMER_RECURSIVE: true
  - PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: true
  - PAPERLESS_TIME_ZONE: $(TZ)
  - PAPERLESS_FILENAME_FORMAT: "{{created_year}}/{{created_month}}/{{correspondent}}/{{title}}"
  - USERMAP_UID: 5002
  - USERMAP_GID: 5000
  # OCR
  - PAPERLESS_OCR_LANGUAGE: deu+eng
  - PAPERLESS_OCR_OUTPUT_TYPE: pdfa-3
  - PAPERLESS_OCR_ROTATE_PAGES: true
  - PAPERLESS_OCR_ROTATE_PAGES_THRESHOLD: 10
  - PAPERLESS_OCR_DESKEW: true
  # OIDC
  - PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
  - PAPERLESS_DISABLE_REGULAR_LOGIN: true
  - POCKET_ID_CLIENT_ID: a0b1a6be-9b5c-47af-8991-3fde21f60d79 
  - PAPERLESS_SOCIALACCOUNT_PROVIDERS: |
      {
        "openid_connect": {
          "SCOPE": ["openid", "profile", "email"],
          "OAUTH_PKCE_ENABLED": true,
          "APPS": [
            {
              "provider_id": "pocket-id",
              "name": "Pocket ID",
              "client_id": "$(POCKET_ID_CLIENT_ID)",
              "secret": "$(POCKET_ID_CLIENT_SECRET)",
              "settings": { "server_url": "https://id.wagner.gg" }
            }
          ]
        }
      }

secretEnvs:
  - PAPERLESS_SECRET_KEY: 
  - POCKET_ID_CLIENT_SECRET: 

database:
  enabled: true
  hostPath: /srv/nvme/container-data/paperless-ngx-db
  rootPassword: 
  userPassword: 

configMaps:
  - name: ocr-decrypt
    defaultMode: 0777
    mountPath: /scripts
    subPath: ocr-decrypt.sh
    content: |
      #!/usr/bin/env bash
      if [[ "${DOCUMENT_WORKING_PATH}" != *.pdf ]]; then
        echo "The file is not a PDF. Skipping."
        exit 0
      fi
      qpdf --show-encryption "${DOCUMENT_WORKING_PATH}" | grep 'File is not encrypted' || qpdf --decrypt --replace-input "${DOCUMENT_WORKING_PATH}"

homepage:
  name: Paperless
  group: Organization
  description: Document Management
  icon: paperless-ngx.svg
  weight: 10
