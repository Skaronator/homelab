apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - base/cleanup-stuck-pods.yaml
  - base/cleanup-transmission.yaml

helmCharts:
  - repo: https://kyverno.github.io/kyverno
    name: kyverno
    version: 3.8.0
    includeCRDs: true
    releaseName: kyverno
    valuesFile: values.yaml
    namespace: kyverno
