image:
  repository: "ghcr.io/slskd/slskd"
  tag: "0.25.1@sha256:ab9ed50e028b524cefdb7c1dd8ebca368a076e18441ee8ac2326473eb850b4c3"

vpn:
  enabled: true
  envs:
    - HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE: '{"auth":"apikey","apikey":"$(GLUETUN_API_KEY)"}'
    - FIREWALL_VPN_INPUT_PORTS: 28767
  secretEnvs:
    - GLUETUN_API_KEY: 

securityContext:
  runAsUser: 5000
  runAsGroup: 5000
  
ports:
  - name: main
    containerPort: 5030

health:
  path: /health

gateway:
  host: slskd.wagner.gg

hostPaths:
  - name: app
    hostPath: /srv/nvme/container-data/slskd
    containerPath: /app
  - name: downloads-complete
    hostPath: /srv/downloads/soulseek/complete
    containerPath: /downloads/soulseek/complete
  - name: downloads-incomplete
    hostPath: /srv/downloads/soulseek/incomplete
    containerPath: /downloads/soulseek/incomplete
  - name: music
    hostPath: /srv/nvme/music
    containerPath: /music
    readOnly: true

homepage:
  name: SLSKD
  group: Downloader
  description: Soulseek Client
  icon: slskd.svg
  weight: 20

envs:
  - SLSKD_UPLOAD_SPEED_LIMIT: 20000
  - SLSKD_DOWNLOAD_SPEED_LIMIT: 1000
  - SLSKD_SHARED_DIR: /music
  - SLSKD_USERNAME: niklas
  - SLSKD_SLSK_LISTEN_PORT: 28767
  - SLSKD_DOWNLOADS_DIR: /downloads/soulseek/complete
  - SLSKD_INCOMPLETE_DIR: /downloads/soulseek/incomplete
  - SLSKD_REMOTE_FILE_MANAGEMENT: true
  # gluetun integeration
  - SLSKD_VPN: true
  - SLSKD_VPN_PORT_FORWARDING: false # not working with my provider
  - SLSKD_VPN_POLLING_INTERVAL: 2500
  - SLSKD_VPN_GLUETUN_URL: http://localhost:62472

secretEnvs:
  - SLSKD_PASSWORD: 
  - SLSKD_API_KEY: 
  - SLSKD_SLSK_USERNAME: 
  - SLSKD_SLSK_PASSWORD: 
  - SLSKD_VPN_GLUETUN_API_KEY: 
