image:
  repository: "ghcr.io/slskd/slskd"
  tag: "0.24.5@sha256:17ef977563be206f3b5932080b1e23883b2cb39dc9010640f6f39b4eaec887e3"

vpn:
  enabled: true
  secretEnvs:
    - API_KEY: 
  envs:
    - VPN_PORT_FORWARDING_UP_COMMAND: |
        curl --location --request PATCH 'http://localhost:5030/api/v0/options' \
        --header 'X-API-Key: $(API_KEY)' \
        --header 'Content-Type: application/json' \
        --data '{
            "soulseek": {
              "listenPort": {{PORT}}
            }
        }'

ports:
  - name: main
    containerPort: 5030

hostPaths:
  - name: app
    hostPath: /srv/nvme/container-data/slskd
    containerPath: /app

gateway:
  host: slskd.wagner.gg

homepage:
  name: SLSKD
  group: Downloader
  description: Soulseek Client
  icon: slskd.svg
  weight: 20

envs:
  - SLSKD_USERNAME: niklas

secretEnvs:
  - SLSKD_PASSWORD: 
  - SLSKD_API_KEY: 
