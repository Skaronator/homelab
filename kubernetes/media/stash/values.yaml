- name: blobs
  hostPath: /srv/nvme/scrap-data/stash-blobs
  containerPath: /blobs
- name: generated
  hostPath: /srv/nvme/scrap-data/stash-generated
  containerPath: /generated
- name: cache
  hostPath: /srv/nvme/scrap-data/stash-cache
  containerPath: /cache
- name: data
  hostPath: /srv/hdd/pp
  containerPath: /data
