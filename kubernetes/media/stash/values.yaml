image:
  repository: "stashapp/stash"
  tag: "v0.31.0@sha256:422b4d2a580e9f52c361264c3003f46a6ae9b7de76e6d08df091f104e90d8fa4"

ports:
  - name: main
    containerPort: 9999

gateway:
  host: stash.wagner.gg

resources:
  limits:
    gpu.intel.com/i915: "1"

homepage:
  name: Stash
  group: Media
  description: Other stuff...
  icon: stash.svg
  weight: 50

envs:
  - STASH_STASH: /data/
  - STASH_CACHE: /cache/
  - STASH_GENERATED: /generated/

hostPaths:
